name: Bug report
description: Report a reproducible problem with the SDK.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never include Substack session cookies, tokens, or private publication data.
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use mocked, redacted data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I removed all credentials and private publication data.
          required: true
